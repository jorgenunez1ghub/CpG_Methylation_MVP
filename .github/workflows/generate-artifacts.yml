name: Generate Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          mkdir -p artifacts
          python -m pytest -q --junitxml=artifacts/pytest-results.xml

      - name: Build sample QC report
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          import pandas as pd

          from cpg_methylation_mvp.core.analyze import analyze_methylation
          from cpg_methylation_mvp.core.transform import normalize_upload
          from cpg_methylation_mvp.core.validate import validate_upload

          sample_path = Path('data/sample/methylation_sample.csv')
          raw = pd.read_csv(sample_path)
          normalized = normalize_upload(raw)
          validated = validate_upload(normalized)
          report = analyze_methylation(validated)

          output_dir = Path('artifacts')
          output_dir.mkdir(parents=True, exist_ok=True)
          (output_dir / 'qc-summary.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
          PY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: artifacts/
